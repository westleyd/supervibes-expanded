<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nested Claude Code</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a2e;
    color: #c9d1d9;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background: #0d1117;
    border-bottom: 1px solid #30363d;
    flex-shrink: 0;
  }

  header h1 { font-size: 16px; font-weight: 600; color: #e6edf3; }

  .status-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: #8b949e;
  }

  .status-dot {
    width: 8px; height: 8px; border-radius: 50%; background: #8b949e;
  }
  .status-dot.running { background: #3fb950; }

  /* --- Controls --- */
  .controls {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 20px;
    background: #161b22;
    border-bottom: 1px solid #30363d;
    flex-shrink: 0;
  }

  .controls input[type="text"] {
    flex: 1;
    padding: 8px 12px;
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 6px;
    color: #e6edf3;
    font-size: 14px;
    outline: none;
  }
  .controls input[type="text"]:focus { border-color: #58a6ff; }

  .controls select {
    padding: 8px 12px;
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 6px;
    color: #e6edf3;
    font-size: 14px;
    outline: none;
    cursor: pointer;
  }

  .controls button {
    padding: 8px 16px;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .controls button:hover { opacity: 0.85; }
  .controls button:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-start { background: #238636; color: #fff; }
  .btn-stop { background: #da3633; color: #fff; }

  /* --- Main Layout --- */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* --- Activity Log Panel --- */
  .panel-log {
    flex: 1;
    display: flex;
    flex-direction: column;
    border-right: 1px solid #30363d;
  }

  .panel-header {
    padding: 8px 16px;
    background: #161b22;
    border-bottom: 1px solid #30363d;
    font-size: 13px;
    font-weight: 600;
    color: #8b949e;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    flex-shrink: 0;
  }

  .log-body {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
    background: #000;
  }

  .log-entry {
    display: flex;
    gap: 10px;
    padding: 5px 16px;
    font-size: 13px;
    line-height: 1.5;
    border-bottom: 1px solid #111;
  }

  .log-entry .log-time {
    color: #555;
    font-family: "SF Mono", Menlo, Consolas, monospace;
    font-size: 11px;
    flex-shrink: 0;
    min-width: 55px;
    padding-top: 2px;
  }

  .log-entry .log-icon {
    flex-shrink: 0;
    width: 18px;
    text-align: center;
    padding-top: 1px;
  }

  .log-entry .log-msg {
    flex: 1;
    word-break: break-word;
    color: #fff;
  }

  .log-entry .log-msg .log-detail {
    font-family: "SF Mono", Menlo, Consolas, monospace;
    font-size: 12px;
    color: #ccc;
    margin-top: 2px;
    white-space: pre-wrap;
  }

  .log-entry.type-start .log-icon { color: #56d364; }
  .log-entry.type-start .log-msg { color: #fff; }

  .log-entry.type-prompt .log-icon { color: #79c0ff; }
  .log-entry.type-prompt .log-msg { color: #fff; }

  .log-entry.type-read .log-icon { color: #666; }
  .log-entry.type-read .log-msg { color: #888; }

  .log-entry.type-stop .log-icon { color: #ff7b72; }
  .log-entry.type-stop .log-msg { color: #fff; }

  .log-entry.type-info .log-icon { color: #e3b341; }
  .log-entry.type-info .log-msg { color: #fff; }

  .log-entry.type-exit .log-icon { color: #ff7b72; }
  .log-entry.type-exit .log-msg { color: #fff; }

  /* --- Terminals Sidebar --- */
  .panel-terminals {
    width: 300px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }

  .terminals-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
  }

  .terminal-count {
    font-size: 13px;
    color: #8b949e;
    margin-bottom: 12px;
  }

  .terminal-card {
    margin-bottom: 8px;
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 6px;
    overflow: hidden;
  }
  .terminal-card.expanded { border-color: #58a6ff; }

  .terminal-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    font-size: 13px;
    color: #e6edf3;
    cursor: pointer;
    user-select: none;
  }
  .terminal-item:hover { background: #161b22; }

  .terminal-item .dot {
    width: 8px; height: 8px; border-radius: 50%; background: #3fb950; flex-shrink: 0;
  }
  .terminal-item .name {
    font-weight: 500;
    font-family: "SF Mono", "Fira Code", Menlo, Consolas, monospace;
    flex: 1;
  }
  .terminal-item .prompt-count {
    font-size: 11px; color: #8b949e; background: #21262d;
    padding: 1px 6px; border-radius: 10px;
  }
  .terminal-item .chevron {
    font-size: 10px; color: #484f58; transition: transform 0.15s;
  }
  .terminal-card.expanded .chevron { transform: rotate(90deg); }

  .terminal-prompts {
    display: none;
    border-top: 1px solid #21262d;
    max-height: 300px;
    overflow-y: auto;
  }
  .terminal-card.expanded .terminal-prompts { display: block; }

  .prompt-item {
    padding: 6px 12px;
    font-family: "SF Mono", Menlo, Consolas, monospace;
    font-size: 11px;
    line-height: 1.4;
    color: #c9d1d9;
    border-bottom: 1px solid #161b22;
    word-break: break-word;
  }
  .prompt-item:last-child { border-bottom: none; }
  .prompt-item .prompt-label { color: #58a6ff; font-size: 10px; margin-bottom: 2px; }

  .prompt-empty {
    padding: 8px 12px; font-size: 11px; color: #484f58; font-style: italic;
  }

  .empty-state {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #484f58;
    font-size: 14px;
    font-style: italic;
  }

  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #484f58; }
</style>
</head>
<body>

<header>
  <h1>Nested Claude Code</h1>
  <div class="status-badge">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Idle</span>
  </div>
</header>

<div class="controls">
  <input type="text" id="goalInput" placeholder="Enter your goal..." />
  <select id="terminalSelect">
    <option value="auto">Auto</option>
    <option value="1">1 Terminal</option>
    <option value="2">2 Terminals</option>
    <option value="3">3 Terminals</option>
    <option value="4">4 Terminals</option>
    <option value="5">5 Terminals</option>
    <option value="6">6 Terminals</option>
  </select>
  <select id="modelSelect">
    <option value="sonnet">Sonnet</option>
    <option value="opus">Opus</option>
    <option value="haiku">Haiku</option>
  </select>
  <select id="iterationSelect">
    <option value="0">0 Iterations</option>
    <option value="1">1 Iteration</option>
    <option value="2">2 Iterations</option>
    <option value="3">3 Iterations</option>
    <option value="4">4 Iterations</option>
    <option value="5">5 Iterations</option>
  </select>
  <button class="btn-start" id="btnStart" onclick="doStart()">Start</button>
  <button class="btn-stop" id="btnStop" onclick="doStop()" disabled>Stop</button>
</div>

<div class="main">
  <div class="panel-log">
    <div class="panel-header">
      Activity Log
      <label style="float:right;font-weight:normal;text-transform:none;letter-spacing:0;cursor:pointer;font-size:12px;color:#484f58;">
        <input type="checkbox" id="rawToggle" style="margin-right:4px;vertical-align:middle;" />raw
      </label>
    </div>
    <div class="log-body" id="logBody">
      <div class="empty-state">Waiting to start...</div>
    </div>
    <div class="log-body" id="rawBody" style="display:none;font-family:'SF Mono',Menlo,Consolas,monospace;font-size:12px;line-height:1.5;white-space:pre-wrap;word-break:break-word;padding:12px 16px;color:#fff;"></div>
  </div>
  <div class="panel-terminals">
    <div class="panel-header">Terminals</div>
    <div class="terminals-list" id="terminalsList">
      <div class="empty-state" id="terminalsEmpty">None</div>
    </div>
  </div>
</div>

<script>
(function() {
  const goalInput = document.getElementById("goalInput");
  const terminalSelect = document.getElementById("terminalSelect");
  const modelSelect = document.getElementById("modelSelect");
  const iterationSelect = document.getElementById("iterationSelect");
  const btnStart = document.getElementById("btnStart");
  const btnStop = document.getElementById("btnStop");
  const statusDot = document.getElementById("statusDot");
  const statusText = document.getElementById("statusText");
  const logBody = document.getElementById("logBody");
  const rawBody = document.getElementById("rawBody");
  const rawToggle = document.getElementById("rawToggle");
  const terminalsList = document.getElementById("terminalsList");
  const terminalsEmpty = document.getElementById("terminalsEmpty");

  rawToggle.addEventListener("change", function() {
    if (rawToggle.checked) {
      logBody.style.display = "none";
      rawBody.style.display = "";
      renderRaw();
    } else {
      logBody.style.display = "";
      rawBody.style.display = "none";
    }
  });

  let eventSource = null;
  let isRunning = false;
  let currentIter = 0;
  let totalIters = 0;
  let controllerLines = [];   // raw lines kept for re-parsing on reload
  let logEntries = [];         // parsed activity entries
  let terminalPrompts = {};
  let expandedTerminals = {};
  let lastSessions = [];

  // --- Parsing ---

  const cmdRegex = /--cmd\s+(\S+)\s+"([^"]*)"/;
  const cmdRegexSingle = /--cmd\s+(\S+)\s+'([^']*)'/;
  const startRegex = /--start\s+(\S+)\s+(\S+)/;
  const readRegex = /--read\s+(\S+)/;
  const stopRegex = /--stop\s+(\S+)/;
  const stopAllRegex = /--stop-all/;
  const listRegex = /--list/;

  function extractPrompt(line) {
    let m = cmdRegex.exec(line);
    if (!m) m = cmdRegexSingle.exec(line);
    if (m && m[2] !== "") return { name: m[1], text: m[2] };
    return null;
  }

  function parseLine(line) {
    // --start
    let m = startRegex.exec(line);
    if (m) return { type: "start", icon: "+", msg: "Started terminal", detail: m[1], dir: m[2] };

    // --cmd with content (skip blank enters)
    const p = extractPrompt(line);
    if (p) return { type: "prompt", icon: ">", msg: "Prompt to " + p.name, detail: p.text };

    // --read
    m = readRegex.exec(line);
    if (m && !startRegex.test(line)) return { type: "read", icon: "~", msg: "Reading output from " + m[1] };

    // --stop-all
    if (stopAllRegex.test(line)) return { type: "stop", icon: "x", msg: "Stopping all terminals" };

    // --stop <name>
    m = stopRegex.exec(line);
    if (m && !stopAllRegex.test(line)) return { type: "stop", icon: "x", msg: "Stopped terminal " + m[1] };

    // Controller exit
    if (line.includes("[Controller exited")) return { type: "exit", icon: "!", msg: line.trim() };

    return null;
  }

  function processLine(line) {
    // Track prompts
    const p = extractPrompt(line);
    if (p) {
      if (!terminalPrompts[p.name]) terminalPrompts[p.name] = [];
      terminalPrompts[p.name].push(p.text);
    }

    // Track --start for immediate sidebar
    const sm = startRegex.exec(line);
    if (sm && !lastSessions.includes(sm[1])) {
      lastSessions.push(sm[1]);
      renderTerminals(lastSessions);
    }

    // Parse for activity log
    const entry = parseLine(line);
    if (entry) {
      entry.time = new Date();
      logEntries.push(entry);
      return true;
    }
    return false;
  }

  // --- Time formatting ---
  function fmtTime(d) {
    if (!d) return "";
    const h = d.getHours().toString().padStart(2, "0");
    const m = d.getMinutes().toString().padStart(2, "0");
    const s = d.getSeconds().toString().padStart(2, "0");
    return h + ":" + m + ":" + s;
  }

  // --- UI ---

  function setRunning(running) {
    isRunning = running;
    statusDot.className = "status-dot " + (running ? "running" : "stopped");
    statusText.textContent = running ? "Running" : "Idle";
    if (running && currentIter > 0) {
      statusText.textContent = "Iteration " + currentIter + " of " + totalIters;
    }
    btnStart.disabled = running;
    btnStop.disabled = !running;
    goalInput.disabled = running;
    terminalSelect.disabled = running;
    modelSelect.disabled = running;
    iterationSelect.disabled = running;
  }

  function isNearBottom(el) {
    return el.scrollHeight - el.scrollTop - el.clientHeight < 60;
  }

  function renderRaw() {
    const wasNear = isNearBottom(rawBody);
    rawBody.textContent = controllerLines.join("\n");
    if (wasNear) rawBody.scrollTop = rawBody.scrollHeight;
  }

  function renderLog() {
    if (logEntries.length === 0) {
      logBody.innerHTML = '<div class="empty-state">Waiting to start...</div>';
      return;
    }

    const wasNear = isNearBottom(logBody);

    // Only append new entries (keep existing DOM nodes)
    const rendered = logBody.querySelectorAll(".log-entry").length;
    for (let i = rendered; i < logEntries.length; i++) {
      const e = logEntries[i];
      const row = document.createElement("div");
      row.className = "log-entry type-" + e.type;

      const time = document.createElement("span");
      time.className = "log-time";
      time.textContent = fmtTime(e.time);

      const icon = document.createElement("span");
      icon.className = "log-icon";
      icon.textContent = e.icon;

      const msg = document.createElement("span");
      msg.className = "log-msg";
      msg.textContent = e.msg;

      if (e.detail) {
        const detail = document.createElement("div");
        detail.className = "log-detail";
        detail.textContent = e.detail;
        msg.appendChild(detail);
      }

      row.appendChild(time);
      row.appendChild(icon);
      row.appendChild(msg);
      logBody.appendChild(row);
    }

    if (wasNear) logBody.scrollTop = logBody.scrollHeight;
  }

  function renderTerminals(sessions) {
    lastSessions = sessions || [];
    if (!sessions || sessions.length === 0) {
      terminalsEmpty.style.display = "";
      terminalsList.querySelectorAll(".terminal-count, .terminal-card").forEach(el => el.remove());
      return;
    }

    terminalsEmpty.style.display = "none";
    terminalsList.querySelectorAll(".terminal-count, .terminal-card").forEach(el => el.remove());

    const countEl = document.createElement("div");
    countEl.className = "terminal-count";
    countEl.textContent = sessions.length + " active terminal" + (sessions.length !== 1 ? "s" : "");
    terminalsList.appendChild(countEl);

    for (const name of sessions) {
      const prompts = terminalPrompts[name] || [];
      const isExpanded = expandedTerminals[name] || false;

      const card = document.createElement("div");
      card.className = "terminal-card" + (isExpanded ? " expanded" : "");

      const item = document.createElement("div");
      item.className = "terminal-item";
      item.innerHTML =
        '<span class="dot"></span>' +
        '<span class="name">' + escapeHtml(name) + '</span>' +
        (prompts.length > 0 ? '<span class="prompt-count">' + prompts.length + '</span>' : '') +
        '<span class="chevron">&#9654;</span>';
      item.onclick = function() {
        expandedTerminals[name] = !expandedTerminals[name];
        renderTerminals(sessions);
      };

      const promptsEl = document.createElement("div");
      promptsEl.className = "terminal-prompts";

      if (prompts.length === 0) {
        const empty = document.createElement("div");
        empty.className = "prompt-empty";
        empty.textContent = "No prompts sent yet";
        promptsEl.appendChild(empty);
      } else {
        for (let i = 0; i < prompts.length; i++) {
          const pEl = document.createElement("div");
          pEl.className = "prompt-item";
          const label = document.createElement("div");
          label.className = "prompt-label";
          label.textContent = "#" + (i + 1);
          const text = document.createElement("div");
          text.textContent = prompts[i];
          pEl.appendChild(label);
          pEl.appendChild(text);
          promptsEl.appendChild(pEl);
        }
      }

      card.appendChild(item);
      card.appendChild(promptsEl);
      terminalsList.appendChild(card);
    }
  }

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  // --- SSE ---

  function connectSSE() {
    if (eventSource) eventSource.close();
    eventSource = new EventSource("/api/stream");

    eventSource.addEventListener("init", function(e) {
      const data = JSON.parse(e.data);
      currentIter = data.currentIteration || 0;
      totalIters = data.iterations || 0;
      setRunning(data.running);
      if (data.goal) goalInput.value = data.goal;
      if (data.terminalCount) terminalSelect.value = String(data.terminalCount);
      if (data.model) modelSelect.value = data.model;
      if (data.iterations !== undefined) iterationSelect.value = String(data.iterations);

      // Re-parse all buffered lines into log entries
      controllerLines = data.controllerOutput || [];
      logEntries = [];
      terminalPrompts = {};
      logBody.innerHTML = "";
      for (const line of controllerLines) {
        processLine(line);
      }
      renderLog();
      renderTerminals(data.sessions);
    });

    eventSource.addEventListener("controller", function(e) {
      const data = JSON.parse(e.data);
      controllerLines.push(data.line);
      if (controllerLines.length > 500) controllerLines.shift();

      const hadNewEntry = processLine(data.line);
      if (hadNewEntry) renderLog();
      if (rawToggle.checked) renderRaw();

      // Re-render sidebar if prompt detected
      if (extractPrompt(data.line)) {
        renderTerminals(lastSessions);
      }
    });

    eventSource.addEventListener("terminals", function(e) {
      const data = JSON.parse(e.data);
      renderTerminals(data.sessions);
    });

    eventSource.addEventListener("status", function(e) {
      const data = JSON.parse(e.data);
      if (data.currentIteration !== undefined) currentIter = data.currentIteration;
      if (data.iterations !== undefined) totalIters = data.iterations;
      setRunning(data.running);
      if (!data.running) renderTerminals([]);
    });

    eventSource.onerror = function() {};
  }

  // --- Actions ---

  window.doStart = async function() {
    const goal = goalInput.value.trim();
    if (!goal) { goalInput.focus(); return; }

    const terminalCount = terminalSelect.value;
    const model = modelSelect.value;
    const iterations = parseInt(iterationSelect.value) || 0;
    currentIter = 0;
    totalIters = iterations;
    controllerLines = [];
    logEntries = [];
    terminalPrompts = {};
    expandedTerminals = {};
    logBody.innerHTML = "";
    renderTerminals([]);

    try {
      const res = await fetch("/api/start", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ goal, terminalCount, model, iterations }),
      });
      const data = await res.json();
      if (!res.ok) alert(data.error || "Failed to start");
    } catch (err) {
      alert("Failed to connect to server");
    }
  };

  window.doStop = async function() {
    try { await fetch("/api/stop", { method: "POST" }); } catch (_) {}
  };

  goalInput.addEventListener("keydown", function(e) {
    if (e.key === "Enter" && !isRunning) doStart();
  });

  // --- Init ---
  fetch("/api/status")
    .then(r => r.json())
    .then(data => {
      currentIter = data.currentIteration || 0;
      totalIters = data.iterations || 0;
      setRunning(data.running);
      if (data.goal) goalInput.value = data.goal;
      if (data.terminalCount) terminalSelect.value = String(data.terminalCount);
      if (data.model) modelSelect.value = data.model;
      if (data.iterations !== undefined) iterationSelect.value = String(data.iterations);
    })
    .catch(() => {})
    .finally(() => connectSSE());

})();
</script>

</body>
</html>
